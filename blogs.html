    <script>
      (function () {
        const grid = document.getElementById("blogs-grid");
        const searchEl = document.getElementById("blogs-search");
        const categoryEl = document.getElementById("blogs-category");
        const prevEl = document.getElementById("blogs-prev");
        const nextEl = document.getElementById("blogs-next");
        const pageInfoEl = document.getElementById("blogs-page-info");
        const paginationEl = document.getElementById("blogs-pagination");

        let items = [];

        let filtered = [];
        let page = 1;
        const pageSize = 6;

        function applyFilters() {
          const q = (searchEl && searchEl.value ? searchEl.value : "")
            .trim()
            .toLowerCase();
          const cat = categoryEl ? categoryEl.value : "all";

          filtered = items.filter((b) => {
            const matchesQuery =
              !q ||
              (b.title || "").toLowerCase().includes(q) ||
              (b.description || "").toLowerCase().includes(q);

            const matchesCat = cat === "all" || (b.category || "") === cat;
            return matchesQuery && matchesCat;
          });

          page = 1;
          render();
          updatePagination();
        }

        function updatePagination() {
          const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
          page = Math.min(Math.max(1, page), totalPages);

          if (paginationEl) {
            paginationEl.style.display =
              filtered.length > pageSize ? "block" : "none";
          }

          if (prevEl) prevEl.style.display = page > 1 ? "inline-block" : "none";
          if (nextEl)
            nextEl.style.display = page < totalPages ? "inline-block" : "none";

          if (pageInfoEl)
            pageInfoEl.textContent = `Page ${page} / ${totalPages}`;
        }

        function render() {
          const start = (page - 1) * pageSize;
          const end = start + pageSize;
          const visible = filtered.slice(start, end);

          grid.innerHTML = visible
            .map((b) => {
              const thumb = b.thumbnail || "images/blogs/thumb-ml.jpg";
              const url = b.url || `blogs/${b.slug}.html`;

              return `
                      <article>
                        <div class="content" style="padding-top: 0.25rem;">
                          <h3 style="margin-bottom: 0.35rem;">${b.title}</h3>
                          <p style="margin: 0 0 0.75rem 0; font-size: 0.95rem; color: inherit;">
                            ${b.date ? `${b.date}` : ""}
                            ${b.readingTime ? `${b.date ? " • " : ""}${b.readingTime}` : ""}
                          </p>

                          <p>${b.description || ""}</p>

                          <ul class="actions">
                            <li><a href="${url}" class="button">Read More</a></li>
                          </ul>
                        </div>
                      </article>
                    `;
            })
            .join("");
        }

        async function loadBlogs() {
          try {
            const res = await fetch("blogs/manifest.json");
            items = await res.json();

            // Enrich with computed fields for existing template
            items = items
              .map((b) => {
                return {
                  ...b,
                  url: b.url || `blogs/${b.slug}.html`,
                  description: b.description || b.excerpt || "",

                  thumbnail:
                    b.thumbnail ||
                    b.featuredImage ||
                    "images/blogs/thumb-ml.jpg",
                };
              })
              .sort((a, b) => (b.date || "").localeCompare(a.date || ""));
          } catch (e) {
            grid.innerHTML =
              "<article><h3>TODO: Add blogs/manifest.json entries</h3><p>Could not load blog data.</p></article>";
            return;
          }

          // Only one (or zero) blog => hide pagination.
          if (paginationEl) paginationEl.style.display = "none";

          // Build categories dynamically from blogs/manifest.json
          // (filter should auto-update whenever categories are added/changed in the manifest)
          const cats = Array.from(
            new Set(
              items.map((b) => (b.category ? b.category : "")).filter(Boolean),
            ),
          ).sort();

          if (categoryEl) {
            categoryEl.innerHTML = "";
            categoryEl.appendChild(new Option("All Categories", "all"));
            cats.forEach((c) => {
              categoryEl.appendChild(new Option(c, c));
            });
          }

          filtered = items.slice();
          page = 1;

          if (paginationEl && items.length <= pageSize)
            paginationEl.style.display = "none";

          render();
          updatePagination();
        }

        if (searchEl) {
          searchEl.addEventListener("input", function () {
            applyFilters();
          });
        }

        if (categoryEl) {
          categoryEl.addEventListener("change", function () {
            applyFilters();
          });
        }

        if (prevEl) {
          prevEl.addEventListener("click", function (e) {
            e.preventDefault();
            page = Math.max(1, page - 1);
            render();
            updatePagination();
          });
        }

        if (nextEl) {
          nextEl.addEventListener("click", function (e) {
            e.preventDefault();
            page = page + 1;
            const totalPages = Math.max(
              1,
              Math.ceil(filtered.length / pageSize),
            );
            page = Math.min(page, totalPages);
            render();
            updatePagination();
          });
        }

        loadBlogs();
      })();
    </script>
